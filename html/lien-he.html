<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ người bán</title>
    <link rel="stylesheet" href="../css/style1.css">
</head>
<body>

    <div class="contact-container">
        <div class="vendor-box">
            <div class="vendor-info">
                <h2>Thông tin liên hệ</h2>
                <h3>Đặng Quốc Định</h3>
                <p class="status">● Đang hoạt động</p>
            </div>
            
            <div class="info-details">
                <p><strong>📍 Địa chỉ:</strong> 14/2 Ngãi Lợi, Hưng Mỹ, Trà Vinh, Vĩnh Long</p>
                <p><strong>📞 Điện thoại:</strong> 0327 159 418</p>
                <p><strong>✉️ Email:</strong> dangquocdinh2006@gmail.com</p>
                <p><strong>⏰ Giờ làm việc:</strong> 7 giờ - 10 giờ 30 phút, 13 giờ - 16 giờ 30 phút</p>
            </div>
        </div>

        <div class="contact-form-box">
            <h2>Gửi Lời Nhắn</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="fullName">Họ và tên:</label>
                    <input type="text" id="fullName" placeholder="Nhập họ và tên" required>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Số điện thoại:</label>
                    <input type="tel" id="phoneNumber" placeholder="Nhập số điện thoại" required>
                </div>

                <div class="form-group">
                    <label for="message">Lời nhắn:</label>
                    <textarea id="message" rows="5" placeholder="Tôi muốn hỏi ..." required></textarea>
                </div>

                <button type="submit" id="btnSubmit">Gửi</button>
            </form>
            <div id="formResponse" class="response-message"></div>
        </div>
    </div>

</body>
</html>
